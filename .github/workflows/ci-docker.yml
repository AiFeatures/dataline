name: CI - Docker

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-docker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci-docker.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write
  attestations: write

jobs:
  docker:
    uses: Ai-road-4-You/enterprise-ci-cd/.github/workflows/ci-docker.yml@v1
    with:
      dockerfile: Dockerfile
      context: .
      push: ${{ github.event_name != 'pull_request' }}
