#
# CI entrypoint — docs/markdown-only repository.
# Wave 2 hardening: BACKLOG.md P0 — ci-adoption theme.
# Uses the enterprise security scan plus inline markdown/link validation.
#
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
        continue-on-error: true
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-mail "**/*.md"
          fail: false

  security:
    uses: Ai-road-4-You/enterprise-ci-cd/.github/workflows/security-scan.yml@v1
    with:
      language: javascript
      run-sast: false
      run-dependency-audit: false
      run-secret-scan: true
      fail-on-high: true
